<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e5d25c; --bg-dark: #0f172a; --bg-card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); display: flex; min-height: 100vh; }
        
        .sidebar { width: 250px; background: var(--bg-card); padding: 20px 0; border-left: 1px solid rgba(255,255,255,0.05); }
        .sidebar h2 { text-align: center; color: var(--primary); margin-bottom: 30px; font-weight: 800; }
        .tab-btn { display: block; width: 100%; text-align: right; padding: 15px 25px; background: none; border: none; color: var(--text); font-size: 1.1rem; cursor: pointer; transition: 0.3s; border-right: 4px solid transparent; }
        .tab-btn:hover { background: rgba(229, 210, 92, 0.1); }
        .tab-btn.active { background: rgba(229, 210, 92, 0.1); border-right-color: var(--primary); color: var(--primary); font-weight: bold; }
        
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        form { background: var(--bg-card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 30px; border-top: 3px solid var(--primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #cbd5e1; font-weight: 600; font-size: 0.95rem; }
        input[type="text"], input[type="url"], input[type="number"], input[type="file"], textarea, select { width: 100%; padding: 12px 15px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; outline: none; font-size: 1rem; transition: 0.3s; }
        input[type="text"]:focus, input[type="url"]:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(229, 210, 92, 0.2); }
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 8px; cursor: pointer; }
        
        .save-btn { background: var(--primary); color: #0f172a; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .save-btn:hover { background: #d4af37; transform: translateY(-2px); }
        .cancel-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 10px 30px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; display: none; }
        .cancel-btn:hover { background: #ef4444; color: white; }
        
        .list-section { background: var(--bg-card); padding: 20px; border-radius: 15px; }
        .item-card { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .item-actions button { padding: 6px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px; }
        .btn-edit { background: rgba(229, 210, 92, 0.2); color: var(--primary); }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        #toast { position: fixed; bottom: 20px; left: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: bold; transform: translateY(100px); opacity: 0; transition: 0.4s; z-index: 9999; }
        .toast-success { background: #10b981; } .toast-error { background: #ef4444; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>لوحة التحكم</h2>
        <button class="tab-btn active" onclick="openTab('general')">⚙️ الإعدادات العامة</button>
        <button class="tab-btn" onclick="openTab('projects')">🚀 المشاريع</button>
        <button class="tab-btn" onclick="openTab('services')">✨ الخدمات</button>
        <button class="tab-btn" onclick="openTab('resume')">🎓 السيرة الذاتية</button>
        <button class="tab-btn" onclick="openTab('skills')">⚡ المهارات</button>
        <button class="tab-btn" onclick="openTab('certificates')">📜 الشهادات</button>
        <button class="tab-btn" onclick="openTab('testimonials')">💬 آراء العملاء (صور)</button>
        <button class="tab-btn" onclick="openTab('contacts')">📞 تواصل معي</button>
    </div>

    <div class="main-content">
        
        <div id="general" class="tab-content active">
            <h2 style="margin-bottom: 20px; color: var(--primary);">الإعدادات العامة والواجهة</h2>
            <form id="formGeneral">
                <div class="grid-2" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div class="form-group"><label>اللون الأساسي</label><input type="color" id="g_color_primary" value="#e5d25c"></div>
                    <div class="form-group"><label>لون الهيدر</label><input type="color" id="g_color_header" value="#1e293b"></div>
                    <div class="form-group"><label>مسار اللوجو</label><input type="text" id="g_logo" placeholder="img/logo.png"></div>
                    <div class="form-group"><label>مسار صورتك الشخصية</label><input type="text" id="g_hero_img" placeholder="img/me.jpg"></div>
                    <div class="form-group"><label>رابط تحميل الـ CV (مثال: files/cv.pdf)</label><input type="text" id="g_cv_link" placeholder="files/Youssef_CV.pdf"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>العنوان (English)</label><input type="text" id="g_hero_en"></div><div class="form-group"><label>العنوان (عربي)</label><input type="text" id="g_hero_ar"></div>
                    <div class="form-group"><label>المسمى الوظيفي (English)</label><input type="text" id="g_sub_en"></div><div class="form-group"><label>المسمى الوظيفي (عربي)</label><input type="text" id="g_sub_ar"></div>
                </div>
                <div class="form-group"><label>نبذة (English)</label><textarea id="g_about_en" rows="3"></textarea></div>
                <div class="form-group"><label>نبذة (عربي)</label><textarea id="g_about_ar" rows="3"></textarea></div>
                <div class="form-group"><label>قصتي (English)</label><textarea id="g_story_en" rows="4"></textarea></div>
                <div class="form-group"><label>قصتي (عربي)</label><textarea id="g_story_ar" rows="4"></textarea></div>
                <button type="submit" class="save-btn" id="btnGeneral">حفظ الإعدادات 💾</button>
            </form>
        </div>

        <div id="projects" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">إدارة المشاريع</h2>
            <form id="formProjects">
                <div class="grid-2">
                    <div class="form-group"><label>رابط الصورة (اختياري)</label><input type="text" id="p_img_path"></div>
                    <div class="form-group"><label>أو رفع صورة من الجهاز</label><input type="file" id="p_files" accept="image/*" multiple></div>
                </div>
                <div class="form-group"><label>أيقونة بديلة (إيموجي)</label><input type="text" id="p_icon" placeholder="💻"></div>
                <div class="grid-2"><div class="form-group"><label>الاسم (English)</label><input type="text" id="p_title_en" required></div><div class="form-group"><label>الاسم (عربي)</label><input type="text" id="p_title_ar" required></div></div>
                <div class="grid-2"><div class="form-group"><label>التاريخ (English)</label><input type="text" id="p_date_en" placeholder="e.g. Jan 2026"></div><div class="form-group"><label>التاريخ (عربي)</label><input type="text" id="p_date_ar" placeholder="مثال: يناير 2026"></div></div>
                <div class="form-group"><label>الوصف (English)</label><textarea id="p_desc_en" rows="2" required></textarea></div><div class="form-group"><label>الوصف (عربي)</label><textarea id="p_desc_ar" rows="2" required></textarea></div>
                <div class="form-group"><label>التقنيات (افصل بفاصلة)</label><input type="text" id="p_tags" placeholder="Python, Java"></div>
                <div class="grid-2"><div class="form-group"><label>رابط التحميل</label><input type="url" id="p_down"></div><div class="form-group"><label>رابط GitHub</label><input type="url" id="p_git"></div></div>
                <button type="submit" class="save-btn" id="btnProjects">إضافة مشروع 🚀</button>
                <button type="button" class="cancel-btn" id="cancelProjects" onclick="cancelEdit('projects')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-projects"></div></div>
        </div>
        
        <div id="services" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">إدارة الخدمات</h2>
            <form id="formServices">
                <div class="grid-2">
                    <div class="form-group"><label>رابط الصورة (اختياري)</label><input type="text" id="s_img_path"></div>
                    <div class="form-group"><label>أو رفع صورة من الجهاز</label><input type="file" id="s_files" accept="image/*" multiple></div>
                </div>
                <div class="form-group"><label>أيقونة بديلة (إيموجي)</label><input type="text" id="s_icon" placeholder="📊"></div>
                <div class="grid-2"><div class="form-group"><label>الاسم (English)</label><input type="text" id="s_title_en" required></div><div class="form-group"><label>الاسم (عربي)</label><input type="text" id="s_title_ar" required></div></div>
                <div class="form-group"><label>وصف (English)</label><textarea id="s_desc_en" rows="2" required></textarea></div><div class="form-group"><label>وصف (عربي)</label><textarea id="s_desc_ar" rows="2" required></textarea></div>
                <button type="submit" class="save-btn" id="btnServices">إضافة خدمة ✨</button>
                <button type="button" class="cancel-btn" id="cancelServices" onclick="cancelEdit('services')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-services"></div></div>
        </div>

        <div id="testimonials" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">إدارة آراء العملاء (صور/سكرين شوت)</h2>
            <form id="formTestimonials">
                <div class="grid-2">
                    <div class="form-group"><label>رابط الصورة (اختياري)</label><input type="text" id="ts_img_path"></div>
                    <div class="form-group"><label>أو رفع سكرين شوت (مطلوب)</label><input type="file" id="ts_files" accept="image/*"></div>
                </div>
                <div class="grid-2">
                    <div class="form-group"><label>اسم العميل أو المشروع (English)</label><input type="text" id="ts_name_en" required></div>
                    <div class="form-group"><label>اسم العميل أو المشروع (عربي)</label><input type="text" id="ts_name_ar" required></div>
                </div>
                <button type="submit" class="save-btn" id="btnTestimonials">إضافة رأي جديد 💬</button>
                <button type="button" class="cancel-btn" id="cancelTestimonials" onclick="cancelEdit('testimonials')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-testimonials"></div></div>
        </div>
        
        <div id="resume" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">السيرة الذاتية (تعليم/خبرة/كورسات)</h2>
            <form id="formResume">
                <div class="grid-2">
                    <div class="form-group"><label>رابط الصورة (اختياري)</label><input type="text" id="r_img_path"></div>
                    <div class="form-group"><label>أو رفع صورة من الجهاز</label><input type="file" id="r_files" accept="image/*" multiple></div>
                </div>
                <div class="form-group">
                    <label>النوع</label>
                    <select id="r_type">
                        <option value="experience">خبرة عمل</option>
                        <option value="education">تعليم</option>
                        <option value="courses">كورسات تدريبية 📚</option>
                    </select>
                </div>
                <div class="grid-2"><div class="form-group"><label>العنوان أو اسم الكورس (English)</label><input type="text" id="r_title_en" required></div><div class="form-group"><label>العنوان أو اسم الكورس (عربي)</label><input type="text" id="r_title_ar" required></div></div>
                <div class="grid-2"><div class="form-group"><label>الجهة أو المنصة (English)</label><input type="text" id="r_sub_en" required></div><div class="form-group"><label>الجهة أو المنصة (عربي)</label><input type="text" id="r_sub_ar" required></div></div>
                <div class="grid-2"><div class="form-group"><label>المدة/التاريخ (English)</label><input type="text" id="r_date_en" placeholder="e.g. 2024 - Present"></div><div class="form-group"><label>المدة/التاريخ (عربي)</label><input type="text" id="r_date_ar"></div></div>
                <button type="submit" class="save-btn" id="btnResume">إضافة للسيرة الذاتية 🎓</button>
                <button type="button" class="cancel-btn" id="cancelResume" onclick="cancelEdit('resume')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-resume"></div></div>
        </div>
        
        <div id="skills" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">المهارات التقنية</h2>
            <form id="formSkills">
                <div class="form-group"><label>الأيقونة (إيموجي، مثال: 🐍, ☕, 📊)</label><input type="text" id="k_icon" placeholder="مثال: 🐍"></div>
                <div class="grid-2"><div class="form-group"><label>الاسم (English)</label><input type="text" id="k_name_en" required></div><div class="form-group"><label>الاسم (عربي)</label><input type="text" id="k_name_ar" required></div></div>
                <div class="form-group"><label>النسبة المئوية (%)</label><input type="number" id="k_percent" min="1" max="100" required></div>
                <button type="submit" class="save-btn" id="btnSkills">إضافة مهارة ⚡</button>
                <button type="button" class="cancel-btn" id="cancelSkills" onclick="cancelEdit('skills')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-skills"></div></div>
        </div>
        
        <div id="certificates" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">الشهادات المعتمدة</h2>
            <form id="formCertificates">
                <div class="form-group" style="background: rgba(229, 210, 92, 0.1); padding: 15px; border-radius: 8px;"><input type="checkbox" id="c_in_progress"> <span style="color: var(--primary); font-weight: bold;">قيد الانتظار؟ (In Progress)</span></div>
                <div class="grid-2">
                    <div class="form-group"><label>رابط الصورة (اختياري)</label><input type="text" id="c_img_path"></div>
                    <div class="form-group"><label>أو رفع صورة من الجهاز</label><input type="file" id="c_files" accept="image/*" multiple></div>
                </div>
                <div class="grid-2"><div class="form-group"><label>الاسم (English)</label><input type="text" id="c_title_en" required></div><div class="form-group"><label>الاسم (عربي)</label><input type="text" id="c_title_ar" required></div></div>
                <div class="form-group"><label>وصف الشهادة/الجهة (English)</label><textarea id="c_desc_en" rows="2" required></textarea></div><div class="form-group"><label>وصف الشهادة/الجهة (عربي)</label><textarea id="c_desc_ar" rows="2" required></textarea></div>
                <div class="grid-2"><div class="form-group"><label>التاريخ (English)</label><input type="text" id="c_date_en" placeholder="e.g. March 2026"></div><div class="form-group"><label>التاريخ (عربي)</label><input type="text" id="c_date_ar"></div></div>
                <div class="form-group"><label>رابط التحقق من الشهادة (Link)</label><input type="url" id="c_link" placeholder="https://..."></div>
                <button type="submit" class="save-btn" id="btnCertificates">إضافة شهادة 📜</button>
                <button type="button" class="cancel-btn" id="cancelCertificates" onclick="cancelEdit('certificates')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-certificates"></div></div>
        </div>

        <div id="contacts" class="tab-content">
            <h2 style="margin-bottom: 20px; color: var(--primary);">طرق التواصل</h2>
            <form id="formContacts">
                <div class="grid-2"><div class="form-group"><label>الأيقونة (إيموجي)</label><input type="text" id="t_icon" required></div><div class="form-group"><label>الرابط (URL)</label><input type="url" id="t_url" required></div></div>
                <div class="grid-2"><div class="form-group"><label>اسم المنصة (English)</label><input type="text" id="t_name_en" required></div><div class="form-group"><label>اسم المنصة (عربي)</label><input type="text" id="t_name_ar" required></div></div>
                <button type="submit" class="save-btn" id="btnContacts">إضافة وسيلة تواصل 📞</button>
                <button type="button" class="cancel-btn" id="cancelContacts" onclick="cancelEdit('contacts')">إلغاء التعديل</button>
            </form>
            <div class="list-section"><div id="list-contacts"></div></div>
        </div>

    </div>

    <div id="toast"></div>

   <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ⚠️ REPLACE WITH YOUR OWN FIREBASE CONFIG ⚠️
        const firebaseConfig = { 
            apiKey: "YOUR_API_KEY_HERE", 
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com", 
            projectId: "YOUR_PROJECT_ID" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let editModes = { projects: null, services: null, resume: null, skills: null, certificates: null, contacts: null, testimonials: null };

        window.showToast = function(msg, type='success') {
            const t = document.getElementById('toast');
            t.innerText = msg; t.className = type === 'success' ? 'toast-success' : 'toast-error';
            t.style.transform = 'translateY(0)'; t.style.opacity = '1';
            setTimeout(() => { t.style.transform = 'translateY(100px)'; t.style.opacity = '0'; }, 3000);
        }

        window.openTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.getImages = async function(fileInputId, textInputId) {
            const files = document.getElementById(fileInputId).files;
            const textPath = document.getElementById(textInputId).value;
            let images = [];
            if (textPath) images.push(textPath);
            if (files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    const base64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.readAsDataURL(files[i]);
                    });
                    images.push(base64);
                }
            }
            return images;
        };

        async function loadGeneral() {
            try {
                const snap = await getDoc(doc(db, "settings", "general"));
                if(snap.exists()) {
                    const d = snap.data();
                    document.getElementById('g_color_primary').value = d.colorPrimary || '#e5d25c';
                    document.getElementById('g_color_header').value = d.colorHeader || '#1e293b';
                    document.getElementById('g_logo').value = d.logo || '';
                    document.getElementById('g_hero_img').value = d.hero_img || '';
                    document.getElementById('g_cv_link').value = d.cv_link || '';
                    document.getElementById('g_hero_en').value = d.hero_en || ''; document.getElementById('g_hero_ar').value = d.hero_ar || '';
                    document.getElementById('g_sub_en').value = d.sub_en || ''; document.getElementById('g_sub_ar').value = d.sub_ar || '';
                    document.getElementById('g_about_en').value = d.about_en || ''; document.getElementById('g_about_ar').value = d.about_ar || '';
                    document.getElementById('g_story_en').value = d.story_en || ''; document.getElementById('g_story_ar').value = d.story_ar || '';
                }
            } catch(e) { console.error(e); }
        }

        document.getElementById('formGeneral').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnGeneral'); btn.innerText = 'جاري الحفظ...'; btn.disabled = true;
            try {
                await setDoc(doc(db, "settings", "general"), {
                    colorPrimary: document.getElementById('g_color_primary').value, colorHeader: document.getElementById('g_color_header').value,
                    logo: document.getElementById('g_logo').value, hero_img: document.getElementById('g_hero_img').value, cv_link: document.getElementById('g_cv_link').value,
                    hero_en: document.getElementById('g_hero_en').value, hero_ar: document.getElementById('g_hero_ar').value,
                    sub_en: document.getElementById('g_sub_en').value, sub_ar: document.getElementById('g_sub_ar').value,
                    about_en: document.getElementById('g_about_en').value, about_ar: document.getElementById('g_about_ar').value,
                    story_en: document.getElementById('g_story_en').value, story_ar: document.getElementById('g_story_ar').value
                }, { merge: true });
                showToast('✅ تم حفظ الإعدادات العامة بنجاح!');
            } catch(error) { showToast('❌ حدث خطأ أثناء الحفظ', 'error'); console.error(error); }
            btn.innerText = 'حفظ الإعدادات 💾'; btn.disabled = false;
        });

        async function saveOrUpdate(colName, dataObj, formId, btnId) {
            const btn = document.getElementById(btnId); const originalText = btn.innerText;
            btn.innerText = 'جاري الحفظ...'; btn.disabled = true;
            try {
                if (editModes[colName]) {
                    await updateDoc(doc(db, colName, editModes[colName]), dataObj);
                    showToast('✅ تم التعديل بنجاح!'); cancelEdit(colName);
                } else {
                    dataObj.createdAt = serverTimestamp();
                    await addDoc(collection(db, colName), dataObj);
                    showToast('✅ تم الإضافة بنجاح!'); document.getElementById(formId).reset();
                }
                loadCollection(colName);
            } catch(e) { console.error(e); showToast('❌ حدث خطأ!', 'error'); }

        async function loadCollection(col) {
            const listDiv = document.getElementById(`list-${col}`); listDiv.innerHTML = '<p>جاري التحميل...</p>';
            try {
                const snapshot = await getDocs(collection(db, col));
                let items = [];
                snapshot.forEach(docSnap => items.push({ id: docSnap.id, ...docSnap.data() }));
                
                items.sort((a, b) => {
                    let o1 = a.order || 0, o2 = b.order || 0;
                    if(o1 !== o2) return o1 - o2;
                    let t1 = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
                    let t2 = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
                    return t2 - t1;
                });

                let html = '';
                items.forEach(d => {
                    const title = d.title_ar || d.name_ar || d.icon + " " + (d.url?'رابط':'');
                    html += `
                        <div class="item-card">
                            <div><span style="color:var(--primary); font-weight:bold; margin-left:10px;">[الترتيب: ${d.order || 0}]</span> <strong>${title}</strong></div>
                            <div class="item-actions">
                                <button class="btn-edit" onclick='editItem("${col}", "${d.id}", ${JSON.stringify(d).replace(/'/g, "&apos;")})'>تعديل ✏️</button>
                                <button class="btn-delete" onclick='deleteItem("${col}", "${d.id}")'>حذف 🗑️</button>
                            </div>
                        </div>`;
                });
                listDiv.innerHTML = html || '<p style="color:#94a3b8;">لا توجد بيانات مضافة بعد.</p>';
            } catch(e) { console.error(e); listDiv.innerHTML = '<p style="color:red;">خطأ في التحميل.</p>'; }
        }

        window.deleteItem = async function(col, id) {
            if(confirm('هل أنت متأكد من حذف هذا العنصر نهائياً؟')) {
                try { await deleteDoc(doc(db, col, id)); showToast('🗑️ تم الحذف بنجاح!'); loadCollection(col); } 
                catch(e) { showToast('❌ حدث خطأ أثناء الحذف', 'error'); }
            }
        }

        window.editItem = function(col, id, item) {
            editModes[col] = id;
            document.getElementById(`btn${col.charAt(0).toUpperCase() + col.slice(1)}`).innerText = 'حفظ التعديلات 🔄';
            document.getElementById(`cancel${col.charAt(0).toUpperCase() + col.slice(1)}`).style.display = 'inline-block';
            window.scrollTo(0,0);
            
            const prefix = col === 'projects' ? 'p' : col === 'services' ? 's' : col === 'resume' ? 'r' : col === 'skills' ? 'k' : col === 'certificates' ? 'c' : col === 'testimonials' ? 'ts' : 't';
            const orderEl = document.getElementById(`${prefix}_order`);
            if(orderEl) orderEl.value = item.order || 0;

            document.getElementById('r_img_path').value = (item.images && item.images.length > 0) ? item.images[0] : '';

            if(col === 'projects') {
                document.getElementById('p_title_en').value = item.title_en; document.getElementById('p_title_ar').value = item.title_ar;
                document.getElementById('p_desc_en').value = item.desc_en; document.getElementById('p_desc_ar').value = item.desc_ar;
                document.getElementById('p_icon').value = item.icon || ''; document.getElementById('p_tags').value = item.tags ? item.tags.join(', ') : '';
                document.getElementById('p_down').value = item.downloadLink || ''; document.getElementById('p_git').value = item.githubLink || '';
                document.getElementById('p_date_en').value = item.date_en || ''; document.getElementById('p_date_ar').value = item.date_ar || '';
                document.getElementById('p_img_path').value = (item.images && item.images.length>0) ? item.images[0] : '';
            }
            if(col === 'services') {
                document.getElementById('s_title_en').value = item.title_en; document.getElementById('s_title_ar').value = item.title_ar;
                document.getElementById('s_desc_en').value = item.desc_en; document.getElementById('s_desc_ar').value = item.desc_ar;
                document.getElementById('s_icon').value = item.icon || '';
                document.getElementById('s_img_path').value = (item.images && item.images.length>0) ? item.images[0] : '';
            }
            if(col === 'resume') {
                document.getElementById('r_type').value = item.type;
                document.getElementById('r_title_en').value = item.title_en; document.getElementById('r_title_ar').value = item.title_ar;
                document.getElementById('r_sub_en').value = item.sub_en; document.getElementById('r_sub_ar').value = item.sub_ar;
                document.getElementById('r_date_en').value = item.date_en || ''; document.getElementById('r_date_ar').value = item.date_ar || '';
            }
           if(col === 'skills') {
                document.getElementById('k_icon').value = item.icon || '';
                document.getElementById('k_name_en').value = item.name_en; 
                document.getElementById('k_name_ar').value = item.name_ar;
                document.getElementById('k_percent').value = item.percentage;
            }
            if(col === 'certificates') {
                document.getElementById('c_in_progress').checked = item.inProgress || false;
                document.getElementById('c_title_en').value = item.title_en; document.getElementById('c_title_ar').value = item.title_ar;
                document.getElementById('c_desc_en').value = item.desc_en; document.getElementById('c_desc_ar').value = item.desc_ar;
                document.getElementById('c_date_en').value = item.date_en || ''; document.getElementById('c_date_ar').value = item.date_ar || '';
                document.getElementById('c_link').value = item.link || '';
                document.getElementById('c_img_path').value = (item.images && item.images.length>0) ? item.images[0] : '';
            }
            if(col === 'contacts') {
                document.getElementById('t_icon').value = item.icon; document.getElementById('t_url').value = item.url;
                document.getElementById('t_name_en').value = item.name_en; document.getElementById('t_name_ar').value = item.name_ar;
            }
            if(col === 'testimonials') {
                document.getElementById('ts_name_en').value = item.name_en; 
                document.getElementById('ts_name_ar').value = item.name_ar;
                document.getElementById('ts_img_path').value = item.image || '';
            }
        }

        window.cancelEdit = function(col) {
            editModes[col] = null;
            document.getElementById(`form${col.charAt(0).toUpperCase() + col.slice(1)}`).reset();
            document.getElementById(`btn${col.charAt(0).toUpperCase() + col.slice(1)}`).innerText = 'إضافة جديد ➕';
            document.getElementById(`cancel${col.charAt(0).toUpperCase() + col.slice(1)}`).style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const formsData = [
                {id: 'formProjects', prefix: 'p'}, {id: 'formServices', prefix: 's'},
                {id: 'formResume', prefix: 'r'}, {id: 'formSkills', prefix: 'k'},
                {id: 'formCertificates', prefix: 'c'}, {id: 'formContacts', prefix: 't'},
                {id: 'formTestimonials', prefix: 'ts'}
            ];
            formsData.forEach(f => {
                const btn = document.getElementById('btn' + f.id.replace('form',''));
                if(btn) {
                    const div = document.createElement('div');
                    div.className = 'form-group';
                    div.innerHTML = `<label style="color:var(--primary); font-size: 1.1rem;">الترتيب (الأرقام الأقل تظهر في البداية)</label><input type="number" id="${f.prefix}_order" value="0" style="border:1px solid var(--primary); background:rgba(229, 210, 92, 0.05); font-weight:bold; font-size: 1.1rem;">`;
                    btn.parentNode.insertBefore(div, btn);
                }
            });

            loadGeneral(); loadCollection('projects'); loadCollection('services'); 
            loadCollection('resume'); loadCollection('skills'); loadCollection('certificates'); loadCollection('contacts'); loadCollection('testimonials');
        });
    </script>
